<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sports Arb Live Packages</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --muted: #8b93a7;
      --text: #eef1f7;
      --line: #2a2f3a;
      --green: #6ee7a8;
      --red: #ff8a8a;
      --amber: #f3c969;
      --blue: #8ab4ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    header { padding: 24px 28px 12px; border-bottom: 1px solid var(--line); }
    h1 { margin: 0 0 8px; font-size: 24px; letter-spacing: -0.02em; }
    .sub { color: var(--muted); font-size: 13px; }
    main { padding: 20px 28px 32px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(7, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
    }
    .label { color: var(--muted); font-size: 12px; margin-bottom: 7px; }
    .value { font-size: 20px; font-weight: 650; }
    .value.good, .good { color: var(--green); }
    .value.bad, .bad { color: var(--red); }
    .warn { color: var(--amber); }
    .muted { color: var(--muted); }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin: 16px 0;
    }
    input, select, button {
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      font: inherit;
    }
    input { min-width: 320px; }
    button { cursor: pointer; }
    button.active { border-color: var(--blue); color: var(--blue); }
    .tableWrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: auto;
      background: var(--panel);
    }
    table { width: 100%; border-collapse: collapse; min-width: 1320px; font-size: 13px; }
    th, td {
      padding: 10px 11px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      background: #1d212a;
      color: var(--muted);
      font-size: 12px;
      z-index: 1;
      cursor: pointer;
      user-select: none;
    }
    tr:hover td { background: #1a1e27; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .pill {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
    }
    .pill.MLB { color: var(--blue); }
    .pill.SOCCER { color: var(--green); }
    .event, .reason {
      max-width: 270px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .reason { color: var(--amber); }
    @media (max-width: 1100px) {
      .stats { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
      input { min-width: 220px; flex: 1; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Sports Arb Live Packages</h1>
    <div class="sub" id="meta">Connecting to live feed...</div>
  </header>
  <main>
    <section class="stats" id="stats"></section>
    <section class="controls">
      <input id="search" placeholder="Search event, package id, asset, strike..." />
      <select id="asset">
        <option value="ALL">All assets</option>
        <option value="SOCCER">SOCCER</option>
        <option value="MLB">MLB</option>
      </select>
      <button id="onlyPositive">Marked positive only</button>
      <button id="refresh">Refresh now</button>
      <button id="reset">Reset</button>
    </section>
    <section class="tableWrap">
      <table>
        <thead>
          <tr>
            <th data-sort="asset">Asset</th>
            <th data-sort="event">Event</th>
            <th data-sort="end">End</th>
            <th data-sort="line">Line</th>
            <th data-sort="shares" class="num">Shares</th>
            <th data-sort="packageCost" class="num">Cost/Share</th>
            <th data-sort="cost" class="num">Actual Cost</th>
            <th data-sort="middlePayout" class="num">Middle Payout</th>
            <th data-sort="histHit" class="num">Hist Middle Hit</th>
            <th data-sort="broadBid" class="num">Broad Bid</th>
            <th data-sort="narrowBid" class="num">Narrow Bid</th>
            <th data-sort="mark" class="num">Mark Proceeds</th>
            <th data-sort="pnl" class="num">Mark P&L</th>
            <th data-sort="roi" class="num">Mark ROI</th>
            <th>Package</th>
            <th>Note</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>
  <script>
    let DATA = { generatedAt: null, packages: [] };
    let rows = [];
    let sortKey = "end";
    let sortDir = 1;
    let positiveOnly = false;
    let loading = false;

    const fmtUsd = (n) => `$${Number(n).toFixed(2)}`;
    const fmtPct = (n) => `${Number(n).toFixed(2)}%`;
    const fmtNum = (n, d = 2) => Number(n).toFixed(d);
    const fmtTime = (iso) => {
      if (!iso) return "";
      return new Date(iso).toLocaleString([], { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
    };

    function normalizeRows(packages) {
      return packages.map((p) => ({
        ...p,
        asset: p.a,
        event: p.e,
        shares: p.sh,
        packageCost: p.pc,
        middlePayout: p.mp,
        histBucket: p.hb,
        histHit: p.hh,
        broadBid: p.bb,
        narrowBid: p.nb,
        mark: p.pro,
        line: `${p.bs}-${p.ns}`,
      }));
    }

    function summarize(list) {
      const cost = list.reduce((s, p) => s + p.cost, 0);
      const mark = list.reduce((s, p) => s + p.mark, 0);
      const pnl = list.reduce((s, p) => s + p.pnl, 0);
      const middle = list.reduce((s, p) => s + (p.middlePayout || 0), 0);
      const weightedHitNumerator = list.reduce((s, p) => s + ((p.histHit ?? 0) * (p.cost || 0)), 0);
      const avgRoi = cost ? (pnl / cost) * 100 : 0;
      const weightedHit = cost ? weightedHitNumerator / cost : 0;
      const positive = list.filter((p) => p.pnl > 0).length;
      return { cost, mark, pnl, avgRoi, positive, middle, weightedHit };
    }

    function renderStats(list) {
      const s = summarize(list);
      const cards = [
        ["Packages", String(list.length), ""],
        ["Cost Basis", fmtUsd(s.cost), ""],
        ["Marked Exit Value", fmtUsd(s.mark), ""],
        ["Marked P&L", fmtUsd(s.pnl), s.pnl >= 0 ? "good" : "bad"],
        ["Marked ROI", fmtPct(s.avgRoi), s.avgRoi >= 0 ? "good" : "bad"],
        ["Middle Payout", fmtUsd(s.middle), "good"],
        ["Weighted Hist Hit", fmtPct(s.weightedHit), "warn"],
        ["Positive Marks", `${s.positive}/${list.length}`, s.positive ? "good" : ""],
      ];
      document.getElementById("stats").innerHTML = cards.map(([label, value, cls]) => `
        <div class="card">
          <div class="label">${label}</div>
          <div class="value ${cls}">${value}</div>
        </div>
      `).join("");
    }

    function filteredRows() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const asset = document.getElementById("asset").value;
      return rows.filter((p) => {
        if (asset !== "ALL" && p.asset !== asset) return false;
        if (positiveOnly && p.pnl <= 0) return false;
        if (!q) return true;
        return [p.id, p.event, p.asset, p.line, p.fr].some((v) => String(v).toLowerCase().includes(q));
      }).sort((a, b) => {
        const av = a[sortKey] ?? "";
        const bv = b[sortKey] ?? "";
        if (typeof av === "number" && typeof bv === "number") return (av - bv) * sortDir;
        return String(av).localeCompare(String(bv)) * sortDir;
      });
    }

    function renderTable(list) {
      document.getElementById("tbody").innerHTML = list.map((p) => `
        <tr>
          <td><span class="pill ${p.asset}">${p.asset}</span></td>
          <td class="event" title="${p.event}">${p.event}</td>
          <td>${fmtTime(p.end)}</td>
          <td>${p.line}</td>
          <td class="num">${fmtNum(p.shares, 2)}</td>
          <td class="num">${fmtNum(p.packageCost, 3)}</td>
          <td class="num">${fmtUsd(p.cost)}</td>
          <td class="num good">${fmtUsd(p.middlePayout || 0)}</td>
          <td class="num warn" title="${p.histBucket || ""}">${p.histHit == null ? "" : fmtPct(p.histHit)}</td>
          <td class="num">${fmtNum(p.broadBid, 3)}</td>
          <td class="num">${fmtNum(p.narrowBid, 3)}</td>
          <td class="num">${fmtUsd(p.mark)}</td>
          <td class="num ${p.pnl >= 0 ? "good" : "bad"}">${fmtUsd(p.pnl)}</td>
          <td class="num ${p.roi >= 0 ? "good" : "bad"}">${fmtPct(p.roi)}</td>
          <td class="event" title="${p.id}">${p.id}</td>
          <td class="reason" title="${p.fr}">${p.fr || ""}</td>
        </tr>
      `).join("");
    }

    function render() {
      const list = filteredRows();
      renderStats(list);
      renderTable(list);
    }

    async function refreshData() {
      if (loading) return;
      loading = true;
      const meta = document.getElementById("meta");
      const prior = meta.textContent;
      meta.textContent = `${prior.replace(" · refreshing...", "")} · refreshing...`;
      try {
        const response = await fetch(`/api/packages?ts=${Date.now()}`);
        if (!response.ok) throw new Error(await response.text());
        DATA = await response.json();
        rows = normalizeRows(DATA.packages || []);
        meta.textContent = `Live source: Dublin /opt/sports-arb/data/polymarket-live-packages.json. Last refresh ${new Date(DATA.generatedAt).toLocaleString()}. Marks use current best bid for each leg. Auto-refresh: 15s.`;
        render();
      } catch (err) {
        meta.innerHTML = `<span class="bad">Live refresh failed:</span> ${String(err.message || err)}`;
      } finally {
        loading = false;
      }
    }

    document.getElementById("search").addEventListener("input", render);
    document.getElementById("asset").addEventListener("change", render);
    document.getElementById("onlyPositive").addEventListener("click", (e) => {
      positiveOnly = !positiveOnly;
      e.currentTarget.classList.toggle("active", positiveOnly);
      render();
    });
    document.getElementById("refresh").addEventListener("click", refreshData);
    document.getElementById("reset").addEventListener("click", () => {
      document.getElementById("search").value = "";
      document.getElementById("asset").value = "ALL";
      positiveOnly = false;
      document.getElementById("onlyPositive").classList.remove("active");
      sortKey = "end";
      sortDir = 1;
      render();
    });
    document.querySelectorAll("th[data-sort]").forEach((th) => {
      th.addEventListener("click", () => {
        const key = th.dataset.sort;
        if (sortKey === key) sortDir *= -1;
        else { sortKey = key; sortDir = 1; }
        render();
      });
    });

    refreshData();
    setInterval(refreshData, 15000);
  </script>
</body>
</html>
